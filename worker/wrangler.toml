name = "jeeyoungbot-proxy"
main = "src/index.js"
compatibility_date = "2025-01-15"
# Workers Free tier (~100k requests/day) is plenty for a personal trip site.

# Shared trip state (saved / hidden pins). Create the namespace once:
#   cd worker && npx wrangler kv namespace create TRIP_STATE
# then paste the printed id below and `npx wrangler deploy`.
[[kv_namespaces]]
binding = "TRIP_STATE"
id = "66ac7513053f41a6a9a9a438a3f7e51c"
