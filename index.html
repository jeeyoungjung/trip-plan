  { day: 3, num: 18, time: '10:30 AM', name: 'Museum of Natural History',
    lat: 40.7813, lng: -73.9740, address: 'Central Park West & 79th St',
    transit: { ko: 'Sant Ambroeus(UES) → AMNH(UWS) · 약 0.9mi · Central Park 가로질러', en: 'Sant Ambroeus (UES) → AMNH (UWS) · ~0.9mi · across Central Park' },
    routeOptions: [
      { mode: 'walk', label: { ko: '도보', en: 'Walk' }, time: { ko: '15~20분', en: '15~20 min' }, cost: { ko: '무료', en: 'Free' }, best: true,
        detail: { ko: '79th St Transverse로 공원 가로질러 (Great Lawn 옆 → CPW 출구). The Mall/Bethesda 포토 스팟 지나감. 일요일 오전 산책 베스트.', en: 'Cross the park via the 79th St Transverse (past Great Lawn → CPW exit). Passes The Mall/Bethesda photo spots. Best as a Sunday-morning walk.' } },
      { mode: 'bike', label: 'Citi Bike', time: { ko: '10분', en: '10 min' }, cost: '$4.79',
        detail: { ko: '공원 길 따라 라이딩. 주말이라 차 없음. 짐 없고 빨리 가고 싶으면.', en: 'Ride the park roads. Car-free on weekends. If you have no bags and want speed.' } },
      { mode: 'uber', label: { ko: 'Uber / 버스', en: 'Uber / Bus' }, time: { ko: '10~15분', en: '10~15 min' }, cost: '$10~14 / $2.90',
        detail: { ko: '79th St는 공원 횡단 차도라 차로도 가능하지만 돌아감. M79 크로스타운 버스도 옵션. 비 오면.', en: '79th St is a park-crossing road so a car works but detours. The M79 crosstown bus is an option too. For rain.' } },
    ],
    note: { ko: '10AM 오픈. 일반 입장 $28, Space Show 포함 $34. 추천: African Mammals / Ocean Life / Rose Center 우주관. 2~2.5시간 관람 + 점심 (아래 픽 참고). 1시쯤 나와서 Lincoln Center 들렀다 호텔 복귀.\n\n🚲 Citi Bike 일요일 루트: Central Park West/East Drive는 주말 차량 통제 — AMNH 앞 도크에서 한 대 잡고 72nd St 로어 루프 한 바퀴 (~1.7mi, 20~30분) 돌고 반납. Day pass $19 또는 single ride $4.79. 헬멧 없어도 OK, 평지.', en: 'Opens 10AM. General admission $28, $34 with the Space Show. Recommended: African Mammals / Ocean Life / Rose Center planetarium. 2–2.5 hrs + lunch (see picks below). Leave around 1, stop at Lincoln Center, then back to the hotel.\n\n🚲 Citi Bike Sunday route: Central Park West/East Drive are car-free on weekends — grab a bike at the dock in front of AMNH, do the 72nd St lower loop (~1.7mi, 20–30 min), and dock it. Day pass $19 or single ride $4.79. No helmet needed, flat terrain.' },
    gmaps: 'https://maps.google.com/?q=American+Museum+of+Natural+History',
    featured: true, tag: 'Museum',
    points: [
      { name: 'Levain Bakery',             lat: 40.7795, lng: -73.9808, category: 'Food',   addr: '167 W 74th St',  note: { ko: '전설의 6oz 청키 쿠키. UWS 본점. 박물관 후 디저트로 픽. 줄 서지만 회전 빨라요.', en: 'The legendary 6oz chunky cookie. UWS original. A post-museum dessert pick. There\'s a line but it moves fast.' } },
      { name: 'Variety Coffee Roasters',   lat: 40.7770, lng: -73.9805, category: 'Coffee', addr: '162 W 72nd St',  note: { ko: '브루클린 출신 로컬 로스터의 UWS 점. 조용하고 진하게. 광고 없는 진짜 로컬 사랑.', en: 'UWS branch of a Brooklyn-born local roaster. Quiet and strong. A genuine local favorite, no hype.' } },
      // === Central Park photo waypoints (걷는 동선 위) ===
      { name: '★ Bethesda Terrace & Fountain', lat: 40.7740, lng: -73.9710, category: 'Design', addr: 'Mid-Park · 72nd St',
        note: { ko: 'Calvert Vaux 디자인 (1864). 천장 미네톤 타일 + 분수대 천사상 (Angel of the Waters). 일요일 오전엔 가스펠 공연도 종종. 5~10분 머무를 만한 NYC 대표 포토.', en: 'Designed by Calvert Vaux (1864). Minton-tile ceiling + the fountain\'s Angel of the Waters. Gospel performances often on Sunday mornings. A 5–10 min stop, a signature NYC photo.' } },
      { name: '★ Bow Bridge', lat: 40.7760, lng: -73.9722, category: 'Design', addr: 'The Lake · 74th St',
        note: { ko: '주철 아치 다리 (1862). NYC 영화에 가장 많이 나온 다리 — Manhattan, Spider-Man 등. The Lake 위 호수 반사 + 보트 배경. 정면 + 사이드 둘 다 찍을 만함.', en: 'Cast-iron arched bridge (1862). The most-filmed bridge in NYC movies — Manhattan, Spider-Man, etc. Lake reflections + rowboats behind. Worth shooting head-on and from the side.' } },
      { name: '★ The Mall (Literary Walk)', lat: 40.7732, lng: -73.9712, category: 'Design', addr: 'Mid-Park · 66th–72nd St',

// =========== MAP ===========
let map;
function initMap() {
  try {
    if (typeof L === 'undefined') {
      throw new Error('Leaflet failed to load');
    }

    map = L.map('map', { zoomControl: false, attributionControl: false })
      .setView([40.745, -73.985], 12);

    L.control.zoom({ position: 'topright' }).addTo(map);
    L.control.attribution({ position: 'bottomleft', prefix: false })
      .addAttribution('© OpenStreetMap · CARTO').addTo(map);

    // Primary tile: CARTO Positron (neutral). Fall back to OSM if it fails.
    const cartoLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', {
      maxZoom: 19,
      subdomains: 'abcd',
    });

    let cartoErrors = 0;
    let fellBack = false;
    cartoLayer.on('tileerror', () => {
      cartoErrors++;
      if (cartoErrors >= 3 && !fellBack) {
        fellBack = true;
        map.removeLayer(cartoLayer);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
        }).addTo(map);
      }
    });
    cartoLayer.addTo(map);

    // Add markers, routes, and wire interaction (defined below)
    setupMarkersAndInteraction();

    // Pull shared saved/hidden pins from the backend, then apply them.
    // Deferred a tick so the whole script (incl. STATE_API / tripState consts
    // defined further down) is evaluated before this runs.
    setTimeout(loadTripState, 0);

    // Force size recalc — sticky containers can mis-measure on initial paint
    setTimeout(() => map.invalidateSize(), 100);
    setTimeout(() => map.invalidateSize(), 500);
    setTimeout(() => map.invalidateSize(), 1500);
  } catch (e) {
    document.getElementById('map').innerHTML =
      '<div style="padding:24px;font-family:monospace;font-size:12px;color:#666;line-height:1.6">' +
      'Map failed to load.<br>' + (e && e.message ? e.message : 'Unknown error') +
      '<br><br>Try opening in Safari or Chrome directly.</div>';
  }
}

const markers = {};
const routeLines = {};
const subMarkers = { 1: [], 2: [], 3: [] };

function setupMarkersAndInteraction(opts) {
  opts = opts || {};
  itinerary.forEach(stop => {
    // Main marker — only if the stop itself has coords. (TBD stops like #14
    // have lat: null and render no numbered pin, but their sub-points still
    // need to appear on the map — that's handled below.)
    if (stop.lat !== null) {
      const featured = stop.featured ? 'featured' : '';
      const icon = L.divIcon({
        className: 'custom-marker',
        html: `<div class="marker-pin day-${stop.day} ${featured}${isHotelStop(stop) ? ' marker-pin-hotel' : ''}" data-num="${stop.num}">${isHotelStop(stop) ? '🏨' : stop.num}</div>`,
        iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -18],
      });
      const marker = L.marker([stop.lat, stop.lng], { icon }).addTo(map);
      const dirHref = gmapsDirectionsURL(stop.lat, stop.lng, tr(stop.name));
      const popupHtml = `
        <div class="popup-eyebrow">Day ${stop.day} · ${tr(stop.time)}</div>
        <div class="popup-title">${tr(stop.name)}</div>
        <div class="popup-address">${tr(stop.address)}</div>
        ${stop.transit ? `<div class="popup-transit ko">${tr(stop.transit)}</div>` : ''}
        <div class="popup-note ko">${tr(stop.note)}</div>
        <div class="popup-actions">
          ${stop.gmaps ? `<a class="popup-link" href="${stop.gmaps}" target="_blank" rel="noopener">Google Maps →</a>` : ''}
          <a class="popup-link popup-link-dir" href="${dirHref}" target="_blank" rel="noopener">${loc('길찾기 →', 'Directions →')}</a>
        </div>
      `;
      marker.bindPopup(popupHtml, { closeButton: true, autoPan: true });
      marker.on('click', () => {
        setActiveStop(stop.num);
        if (!isMobile()) scrollListToStop(stop.num);
      });
      markers[stop.num] = marker;
    }

    // Sub-markers for sights/shopping within this stop — render regardless
    // of whether the parent stop has coords, so TBD stops still show their
    // sub-points on the map.
    if (stop.points && stop.points.length) {
      stop.points.forEach((p, i) => {
        if (p.lat == null || p.lng == null) return;
        const subIcon = L.divIcon({
          className: 'custom-marker',
          html: `<div class="sub-marker" data-sub="${stop.num}-${i}" data-cat="${p.category}" title="${tr(p.name)}"></div>`,
          iconSize: [12, 12], iconAnchor: [6, 6], popupAnchor: [0, -8],
        });
        const subMarker = L.marker([p.lat, p.lng], { icon: subIcon }).addTo(map);
        // Attach category + sub-id directly to the marker object so filters
        // can read them even when the marker has been removed from the map
        // (getElement() returns null when detached, so DOM-based lookup fails).
        subMarker.category = p.category;
        subMarker.subId = `${stop.num}-${i}`;
        // Function popup so the Hide/Restore action reflects current state
        // each time it opens.
        const sid = `${stop.num}-${i}`;
        subMarker.bindPopup(() => buildPlacePopup({
          eyebrow: `${p.category} · ${tr(stop.name)}`,
          title: tr(p.name), addr: tr(p.addr), note: tr(p.note),
          gmapsQ: tr(p.name) + ' ' + tr(p.addr), id: sid,
          lat: p.lat, lng: p.lng,
        }), { closeButton: true, autoPan: true });
        subMarkers[stop.day].push(subMarker);
      });
    }
  });

  const dayCoords = { 1: [], 2: [], 3: [] };
  itinerary.filter(s => s.lat !== null).forEach(s => dayCoords[s.day].push([s.lat, s.lng]));
  const routeStyles = {
    1: { color: '#2C2924', weight: 1.5, opacity: 0.5, dashArray: '4 6' },
    2: { color: '#7A7367', weight: 1.5, opacity: 0.5, dashArray: '4 6' },
    3: { color: '#B5AEA1', weight: 1.5, opacity: 0.5, dashArray: '4 6' },
  };
  [1, 2, 3].forEach(d => {
    if (dayCoords[d].length > 1) routeLines[d] = L.polyline(dayCoords[d], routeStyles[d]).addTo(map);
  });

  // Initial bounds — include sub-points so all dots fit in view
  // (`lat > 40.70` filters out the JFK / SFO airport stops).
  const allNycCoords = [];
  itinerary.forEach(s => {
    if (s.lat !== null && s.lat > 40.70) allNycCoords.push([s.lat, s.lng]);
    (s.points || []).forEach(p => {
      if (p.lat != null && p.lat > 40.70) allNycCoords.push([p.lat, p.lng]);
    });
  });
  if (allNycCoords.length > 0 && !opts.skipFit) {
    map.fitBounds(L.latLngBounds(allNycCoords).pad(0.12));
  }
}

// =========== INTERACTION ===========
function setActiveStop(num) {
  const activeNum = parseInt(num);
  document.querySelectorAll('.stop').forEach(el => {
    el.classList.remove('active');
    const stopNum = parseInt(el.dataset.num);
    el.classList.toggle('past', stopNum < activeNum);
  });
  document.querySelectorAll('.marker-pin').forEach(el => {
    el.classList.remove('active');
    const stopNum = parseInt(el.dataset.num);
    el.classList.toggle('past', stopNum < activeNum);
  });
  const stopEl = document.querySelector(`.stop[data-num="${activeNum}"]`);
  if (stopEl) { stopEl.classList.add('active'); stopEl.classList.remove('past'); }
  const markerEl = document.querySelector(`.marker-pin[data-num="${activeNum}"]`);
  if (markerEl) { markerEl.classList.add('active'); markerEl.classList.remove('past'); }
}

function scrollListToStop(num) {
  const stopEl = document.querySelector(`.stop[data-num="${num}"]`);
  if (!stopEl) return;
  stopEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function focusSubPoint(subId) {
  // subId format: "parentNum-index"
  const [parentNumStr, idxStr] = subId.split('-');
  const parentNum = parseInt(parentNumStr);
  const idx = parseInt(idxStr);
  const parent = itinerary.find(s => s.num === parentNum);
  if (!parent || !parent.points || !parent.points[idx]) return;
  const pt = parent.points[idx];
  // Find the matching Leaflet sub-marker
  const sub = subMarkers[parent.day].find(m => {
    const el = m.getElement && m.getElement();
    return el && el.querySelector(`[data-sub="${subId}"]`);
  });
  if (!sub) return;
  if (isMobile()) {
    document.querySelector('.map-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
    setTimeout(() => {
      map.invalidateSize();
      map.flyTo([pt.lat, pt.lng], 17, { duration: 0.7 });
      setTimeout(() => sub.openPopup(), 700);
    }, 350);
  } else {
    map.flyTo([pt.lat, pt.lng], 17, { duration: 0.7 });
    setTimeout(() => sub.openPopup(), 600);
  }
}

function focusStop(num) {
  const stop = itinerary.find(s => s.num === num);
  setActiveStop(num);
  if (stop.lat === null) return;

  // On mobile, scroll page so sticky map+tabs are visible at top first.
  // Then fly map, then open popup with extra delay so user sees the motion.
  if (isMobile()) {
    document.querySelector('.map-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
    setTimeout(() => {
      map.invalidateSize();
      map.flyTo([stop.lat, stop.lng], 15, { duration: 0.7 });
      setTimeout(() => markers[num].openPopup(), 700);
    }, 350);
  } else {
    map.flyTo([stop.lat, stop.lng], 15, { duration: 0.8 });
    setTimeout(() => markers[num].openPopup(), 600);
  }
}

// =========== DAY FILTER ===========
// =========== UNIFIED MAP FILTERS ===========
// Two independent filter axes that combine (intersection):
//   filters.activeDay      — 'all' | '1' | '2' | '3'  (driven by day tabs / legend day items)
//   filters.activeCategories — Set of category names  (driven by legend category items)
// applyMapFilters() reconciles every marker + route line against both.
// Built-in sub-point categories. 'Saved' is the user-added (★) pin bucket —
// it's a full filter category but does NOT count toward main-marker isolation.
const BASE_CATS = ['Coffee', 'Food', 'Shopping', 'Books', 'Design'];
const ALL_CATS = [...BASE_CATS, 'Saved'];
const filters = {
  activeDay: 'all',
  activeCategories: new Set(ALL_CATS),
  showTrash: false,   // when true, reveal hidden ("trashed") pins for restore
};

function coordsForDay(d) {
  const c = [];
  itinerary.forEach(s => {
    if (s.day !== d) return;
    if (s.lat !== null && s.lat > 40.70) c.push([s.lat, s.lng]);
    (s.points || []).forEach(p => {
      if (p.lat != null && p.lat > 40.70) c.push([p.lat, p.lng]);
    });
  });
  return c;
}

function applyMapFilters() {
  const dayMatch = (d) => filters.activeDay === 'all' || String(d) === filters.activeDay;
  // When categories are isolated (fewer than all 5 active), hide the main
  // numbered stop markers + route lines too — otherwise the big numbered
  // pins stay everywhere and the "filter" looks like nothing changed.
  // Main stops aren't tagged per-category, so they can't be filtered by
  // category individually; we treat any isolation as "show only category
  // sub-points".
  const catsIsolated = BASE_CATS.some(c => !filters.activeCategories.has(c));

  // Main stop markers — visible if day matches AND categories aren't isolated
  itinerary.forEach(stop => {
    const m = markers[stop.num];
    if (!m) return;
    const show = dayMatch(stop.day) && !catsIsolated;
    if (show && !map.hasLayer(m)) m.addTo(map);
    else if (!show && map.hasLayer(m)) map.removeLayer(m);
  });

  // Route lines per day — visible if day matches AND categories aren't isolated
  [1, 2, 3].forEach(d => {
    if (!routeLines[d]) return;
    const show = dayMatch(d) && !catsIsolated;
    if (show && !map.hasLayer(routeLines[d])) routeLines[d].addTo(map);
    else if (!show && map.hasLayer(routeLines[d])) map.removeLayer(routeLines[d]);
  });

  // Sub-markers — visible if both day AND category match.
  // Read category from the marker object (set in setupMarkersAndInteraction)
  // — NOT from the DOM, because getElement() returns null after a marker is
  // removed, which would silently make all hidden markers re-appear on the
  // next filter change ("category bleed" bug).
  // Favorited (pinned) sub-points show under the "Favorite" (Saved) filter too,
  // regardless of their base category. Read once per pass.
  const pinnedSet = new Set(parseHash().pin);
  const favOn = filters.activeCategories.has('Saved');
  [1, 2, 3].forEach(d => {
    subMarkers[d].forEach(marker => {
      const cat = marker.category || null;
      const hidden = isHidden(marker.subId);
      const isPinned = pinnedSet.has(marker.subId);
      // Hidden ("trashed") markers only show in Trash mode; otherwise gate
      // on day AND (category active OR (pinned + Favorite active)).
      const show = hidden
        ? filters.showTrash
        : dayMatch(d) && ((!cat || filters.activeCategories.has(cat)) || (isPinned && favOn));
      if (show && !map.hasLayer(marker)) marker.addTo(map);
      else if (!show && map.hasLayer(marker)) map.removeLayer(marker);
      const el = marker.getElement && marker.getElement();
      if (el) el.classList.toggle('trashed', hidden && show);
    });
  });

  // User-added (★) pins — gated on the 'Saved' category, not day, so personal
  // marks persist across day filters. Trashed ones follow the same rule.
  customMarkers.forEach((marker, key) => {
    const hidden = isHidden(key);
    const show = hidden ? filters.showTrash : filters.activeCategories.has('Saved');
    if (show && !map.hasLayer(marker)) marker.addTo(map);
    else if (!show && map.hasLayer(marker)) map.removeLayer(marker);
    const el = marker.getElement && marker.getElement();
    if (el) el.classList.toggle('trashed', hidden && show);
  });
}

// Filter the sidebar list to match the same { day, categories } state.
// When a category is isolated, hide stops with no matching sub-point, and
// hide day sections that end up empty. Day filter alone behaves as before.
function applyListFilters() {
  const dayMatch = (d) => filters.activeDay === 'all' || String(d) === filters.activeDay;
  const catsIsolated = BASE_CATS.some(c => !filters.activeCategories.has(c));
  const dayHasContent = { 1: false, 2: false, 3: false };

  document.querySelectorAll('.stop').forEach(stopEl => {
    const num = parseInt(stopEl.dataset.num, 10);
    const stop = itinerary.find(s => s.num === num);
    if (!stop) return;

    if (!dayMatch(stop.day)) {
      stopEl.classList.add('hidden');
      return;
    }

    if (!catsIsolated) {
      // No category filter — show the whole stop and all its sub-points.
      stopEl.classList.remove('hidden');
      stopEl.querySelectorAll('.sub-point').forEach(sp => sp.classList.remove('hidden'));
      dayHasContent[stop.day] = true;
      return;
    }

    // Category isolated — sub-points filtered individually, stop shown only
    // if any sub-point matches. A pinned (favorited) row also matches when
    // "Favorite" (Saved) is active, regardless of its base category — so
    // isolating to Favorite reveals all favorites.
    const pinnedSetL = new Set(parseHash().pin);
    const favOnL = filters.activeCategories.has('Saved');
    let hasMatch = false;
    stopEl.querySelectorAll('.sub-point').forEach(sp => {
      const id = sp.dataset.sub;
      const match = filters.activeCategories.has(sp.dataset.cat)
        || (favOnL && pinnedSetL.has(id));
      sp.classList.toggle('hidden', !match);
      if (match) hasMatch = true;
    });
    stopEl.classList.toggle('hidden', !hasMatch);
    if (hasMatch) dayHasContent[stop.day] = true;
  });

  // Deleted sub-points: hidden from the list, EXCEPT in Trash mode (the
  // "Deleted" legend toggle), where they reappear so they can be restored.
  // Their remove button flips to a restore (↩) affordance while shown.
  document.querySelectorAll('.sub-point[data-sub]').forEach(sp => {
    const deleted = isHidden(sp.dataset.sub);
    const rb = sp.querySelector('.sub-point-remove');
    if (rb) {
      rb.textContent = deleted ? '↩' : '🗑';
      rb.title = deleted ? loc('다시 표시', 'Restore') : loc('관심 없음', 'Remove');
    }
    // Only force visibility for deleted rows; leave category/day filtering of
    // non-deleted rows untouched.
    if (deleted) sp.classList.toggle('hidden', !filters.showTrash);
  });

  document.querySelectorAll('.day-section').forEach(section => {
    if (section.id === 'addedSection') return;   // handled separately below
    const d = parseInt(section.dataset.day, 10);
    const dayOK = dayMatch(d);
    const hasContent = !catsIsolated || dayHasContent[d];
    section.classList.toggle('hidden', !(dayOK && hasContent));
  });

  // The "Favorites" (added) section is day-agnostic. Hide it when isolated
  // to a non-Saved category or when every row is currently hidden.
  const addedSection = document.getElementById('addedSection');
  if (addedSection) {
    const catOK = !catsIsolated || filters.activeCategories.has('Saved');
    const anyVisible = !!addedSection.querySelector('.sub-point:not(.hidden)');
    addedSection.classList.toggle('hidden', !catOK || !anyVisible);
  }
}

// =========== NOW / NEXT ===========
// Resolve each stop's "8:34 AM" + day → a NY-time epoch ms. Trip is in May
// 2026, fully inside EDT (UTC-4), so we hardcode the offset rather than
// drag in a timezone lib for one calculation. Date.now() returns UTC ms
// regardless of the device's timezone, so the comparison is correct
// whether the user is in NY, SF, or Seoul.
const TRIP_DAYS = { 1: '2026-05-29', 2: '2026-05-30', 3: '2026-05-31' };
function stopTimestamp(stop) {
  const m = stop.time && stop.time.match(/(\d+):(\d+)\s*(AM|PM)?/i);
  if (!m) return null;
  let h = parseInt(m[1], 10);
  const mm = parseInt(m[2], 10);
  const ampm = (m[3] || '').toUpperCase();
  if (ampm === 'PM' && h < 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  const [y, mo, d] = TRIP_DAYS[stop.day].split('-').map(Number);
  return Date.UTC(y, mo - 1, d, h + 4, mm);  // +4h = EDT → UTC
}

function findNowNext() {
  const now = Date.now();
  let active = null, next = null;
  for (const s of itinerary) {
    const t = stopTimestamp(s);
    if (t == null) continue;
    if (t <= now) active = s;
    else if (!next) next = s;
  }
  return { active, next };
}

function refreshNowNext() {
  document.querySelectorAll('.stop-pill').forEach(p => p.remove());
  const { active, next } = findNowNext();
  if (active) {
    const el = document.querySelector(`.stop[data-num="${active.num}"]`);
    if (el) {
      const pill = document.createElement('span');
      pill.className = 'stop-pill now';
      pill.textContent = 'Now';
      el.appendChild(pill);
    }
  }
  if (next) {
    const el = document.querySelector(`.stop[data-num="${next.num}"]`);
    if (el) {
      const pill = document.createElement('span');
      pill.className = 'stop-pill next';
      pill.textContent = 'Next';
      el.appendChild(pill);
    }
  }
}
refreshNowNext();
setInterval(refreshNowNext, 60_000);

// On first load: if we're inside the trip window, jump the list + map to "Now".
// =========== URL DEEP-LINK STATE ===========
// Shareable URL hash format: `#stop=14&day=2&pin=14-3,14-7`
//   stop=N → focus that stop (scroll list + fly map)
//   day=D  → activate that day tab
//   pin=X-Y,... → mark those sub-points (by `${stop.num}-${index}`) as pinned
// State is single source of truth in the URL — copy URL = share state.

function parseHash() {
  const raw = location.hash.slice(1);
  const params = new URLSearchParams(raw);
  return {
    stop: parseInt(params.get('stop'), 10) || null,
    day: params.get('day') || null,
    pin: (params.get('pin') || '').split(',').map(s => s.trim()).filter(Boolean),
    lang: params.get('lang') === 'en' ? 'en' : null,
  };
}

function writeHash(state) {
  const parts = [];
  if (state.lang === 'en') parts.push('lang=en');  // ko is default → omitted
  if (state.stop) parts.push('stop=' + state.stop);
  if (state.day) parts.push('day=' + state.day);
  if (state.pin && state.pin.length) parts.push('pin=' + state.pin.join(','));
  const next = parts.length ? '#' + parts.join('&') : '';
  if (location.hash !== next) {
    // replaceState so back button doesn't replay every micro-interaction.
    history.replaceState(null, '', next || location.pathname + location.search);
  }
}

function patchHash(updates) {
  const cur = parseHash();
  writeHash({ ...cur, ...updates });
}

function togglePinInHash(subId) {
  const cur = parseHash();
  const idx = cur.pin.indexOf(subId);
  if (idx >= 0) cur.pin.splice(idx, 1);
  else cur.pin.push(subId);
  writeHash(cur);
  return idx < 0;  // returns whether it's now pinned
}

function syncPinUI() {
  const pinned = new Set(parseHash().pin);
  document.querySelectorAll('.sub-point-pin').forEach(btn => {
    const on = pinned.has(btn.dataset.sub);
    btn.classList.toggle('pinned', on);
    btn.textContent = on ? '★' : '☆';
  });
  // Mirror onto map sub-markers via the inner .sub-marker[data-sub] element.
  document.querySelectorAll('.sub-marker').forEach(m => {
    const on = pinned.has(m.dataset.sub);
    m.classList.toggle('pinned', on);
  });
  // Lift favorited sub-markers above everything else on the map so the gold
  // stars are never occluded by neighboring pins.
  [1, 2, 3].forEach(d => {
    if (typeof subMarkers === 'undefined' || !subMarkers[d]) return;
    subMarkers[d].forEach(marker => {
      marker.setZIndexOffset(pinned.has(marker.subId) ? 1000 : 0);
    });
  });
  // Mirror onto any open popup's favorite button.
  document.querySelectorAll('.popup-fav').forEach(btn => {
    const on = pinned.has(btn.dataset.sub);
    btn.classList.toggle('on', on);
    btn.textContent = on ? '★' : '☆';
  });
  // Keep the "Favorite" legend visibility in sync with the favorites count.
  syncFavoriteLegend();
}

// Favorite (pin) click handler — delegated; works for list pins AND popup
// favorite buttons (both carry data-sub).
document.addEventListener('click', (e) => {
  const btn = e.target.closest('.sub-point-pin, .popup-fav');
  if (!btn) return;
  e.stopPropagation();
  e.preventDefault();
  togglePinInHash(btn.dataset.sub);
  syncPinUI();
  // If "Favorite" filter is active (alone or alongside others), the new
  // favorite needs to appear immediately in the list + on the map.
  if (typeof applyMapFilters === 'function') applyMapFilters();
  if (typeof applyListFilters === 'function') applyListFilters();
});

// React to hash changes (back/forward, external paste)

// Map trip days to dates so we can auto-select today's tab on load.
const TRIP_DATES = { 1: '2026-05-29', 2: '2026-05-30', 3: '2026-05-31' };
function detectCurrentTripDay() {
  const parts = new Date().toLocaleDateString('en-US', {
    timeZone: 'America/New_York', year: 'numeric', month: '2-digit', day: '2-digit',
  }).split('/');
  if (parts.length !== 3) return null;
  const todayStr = `${parts[2]}-${parts[0]}-${parts[1]}`;
  for (const [day, date] of Object.entries(TRIP_DATES)) {
    if (date === todayStr) return day;
  }
  return null;
}

function applyHashStateFromUrl(isInitial) {
  const state = parseHash();
  // Day tab — explicit hash wins; otherwise on initial load default to today's
  // trip day so opening the app during the trip lands on the right day.
  let dayToShow = state.day;
  if (!dayToShow && isInitial) dayToShow = detectCurrentTripDay();
  if (dayToShow) {
    const tab = document.querySelector(`.tab[data-day="${dayToShow}"]`);
    if (tab && !tab.classList.contains('active')) tab.click();
  }
  // Pins
  syncPinUI();
  // Focused stop (focusStop already handles scroll + fly + popup)
  if (state.stop) {
    setTimeout(() => {
      if (typeof focusStop === 'function') focusStop(state.stop);
    }, isInitial ? 900 : 0);
  }
}

// Sync click-state changes back to the URL. Wrap existing handlers.
(function wireHashWriters() {
  // Stop focus → hash
  const origFocusStop = focusStop;
  focusStop = function (num) {
    patchHash({ stop: num });
    return origFocusStop(num);
  };
  // Day tab → hash
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const d = tab.dataset.day;
      patchHash({ day: d === 'all' ? null : d, stop: null });
    });
  });
})();

(function initialJump() {
  // If the URL hash already targets a stop, let that drive — don't override
  // with the Now/Next auto-jump.
  const initialHash = parseHash();
  if (initialHash.stop || initialHash.day) {
    setTimeout(() => applyHashStateFromUrl(true), 100);
    return;
  }
  // Otherwise, jump to "Now" if we're inside the trip window.
  const { active } = findNowNext();
  if (!active || active.lat == null) return;
  setTimeout(() => {
    const el = document.querySelector(`.stop[data-num="${active.num}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    if (typeof map !== 'undefined' && map) {
      map.flyTo([active.lat, active.lng], 14, { duration: 1.0 });
      if (typeof setActiveStop === 'function') setActiveStop(active.num);
    }
  }, 900);
})();

// =========== WEATHER ===========
const WMO_LABELS = {
  0: 'Clear', 1: 'Mostly clear', 2: 'Partly cloudy', 3: 'Cloudy',
  45: 'Fog', 48: 'Fog',
  51: 'Drizzle', 53: 'Drizzle', 55: 'Drizzle', 56: 'Drizzle', 57: 'Drizzle',
  61: 'Rain', 63: 'Rain', 65: 'Heavy rain', 66: 'Freezing rain', 67: 'Freezing rain',
  71: 'Snow', 73: 'Snow', 75: 'Heavy snow', 77: 'Snow grains',
  80: 'Showers', 81: 'Showers', 82: 'Heavy showers',
  85: 'Snow showers', 86: 'Snow showers',
  95: 'Thunderstorm', 96: 'Thunderstorm', 99: 'Thunderstorm',
};
const DAY_DATES = { 1: '2026-05-29', 2: '2026-05-30', 3: '2026-05-31' };

async function loadWeather() {
  const url = 'https://api.open-meteo.com/v1/forecast'
    + '?latitude=40.75&longitude=-73.98'
    + '&daily=temperature_2m_max,temperature_2m_min,weathercode'
    + '&temperature_unit=fahrenheit&timezone=America/New_York'
    + `&start_date=${DAY_DATES[1]}&end_date=${DAY_DATES[3]}`;
  try {
    const r = await fetch(url);
    if (!r.ok) return;
    const data = await r.json();
    const dailyTimes = data.daily?.time || [];
    [1, 2, 3].forEach(day => {
      const idx = dailyTimes.indexOf(DAY_DATES[day]);
      if (idx === -1) return;
      const hi = Math.round(data.daily.temperature_2m_max[idx]);
      const lo = Math.round(data.daily.temperature_2m_min[idx]);
      const cond = WMO_LABELS[data.daily.weathercode[idx]] || '—';
      const header = document.querySelector(`.day-section[data-day="${day}"] .day-header`);
      if (!header) return;
      const chip = document.createElement('div');
      chip.className = 'day-weather';
      chip.innerHTML = `<span class="wx-temp">${hi}° / ${lo}°</span><span class="wx-cond">${cond}</span>`;
      header.appendChild(chip);
      requestAnimationFrame(() => chip.classList.add('loaded'));
    });
  } catch (_) { /* silent — no network or out of forecast range */ }
}
loadWeather();

// When the mobile soft keyboard opens, the visual viewport shrinks but a
// `bottom: 0` element would normally extend underneath it. We track
// visualViewport.height and set --chat-h on the panel so the composer
// stays visible. Only applied on narrow screens; desktop uses dvh.
// Mobile keyboard fit:
//   - syncChatHeight pulls visualViewport (height + offsetTop) into CSS vars
//     so the panel sizes to the visible area and tracks any iOS offset shift.
//   - lockBody/unlockBody pin the body in place (saving + restoring scroll)
//     so iOS Safari can't scroll behind the panel while the keyboard is up,
//     which is what makes the chat appear to "disappear" otherwise.
function syncChatHeight() {
  if (window.innerWidth > 900) {
    chatPanelEl.style.removeProperty('--chat-h');
    chatPanelEl.style.removeProperty('--chat-top');
    return;
  }
  if (window.visualViewport) {
    chatPanelEl.style.setProperty('--chat-h', window.visualViewport.height + 'px');
    chatPanelEl.style.setProperty('--chat-top', window.visualViewport.offsetTop + 'px');
  }
}
if (window.visualViewport) {
  const onVvChange = () => { if (chatPanelEl.classList.contains('open')) syncChatHeight(); };
  window.visualViewport.addEventListener('resize', onVvChange);
  window.visualViewport.addEventListener('scroll', onVvChange);
}
window.addEventListener('resize', () => {
  if (chatPanelEl.classList.contains('open')) syncChatHeight();
});

let savedScrollY = 0;
let isMobileLocked = false;
function lockBody() {
  if (window.innerWidth > 900) {
    document.body.classList.add('chat-locked');
    return;
  }
  savedScrollY = window.scrollY || window.pageYOffset || 0;
  document.body.classList.add('chat-locked');
  document.body.style.top = '-' + savedScrollY + 'px';
  isMobileLocked = true;
}
function unlockBody() {
  document.body.classList.remove('chat-locked');
  document.body.style.top = '';
  if (isMobileLocked) {
    window.scrollTo(0, savedScrollY);
    isMobileLocked = false;
  }
}

function chatOpen() {
  chatPanelEl.classList.add('open');
  chatBackdropEl.classList.add('open');
  chatToggleEl.classList.add('is-open');
  chatPanelEl.setAttribute('aria-hidden', 'false');
  chatBackdropEl.setAttribute('aria-hidden', 'false');
  lockBody();
  syncChatHeight();

      `Hi! Ask me anything about the NYC trip — restaurant backups, weather/schedule tweaks, route ideas, and more. (${label})`
    ));

  if (NEEDS_BROWSER_KEY && !apiKey) setTimeout(() => chatKeyInputEl.focus(), 340);
  else setTimeout(() => chatInputEl.focus(), 340);
}

  chatPanelEl.classList.remove('open');
  chatBackdropEl.classList.remove('open');
  chatToggleEl.classList.remove('is-open');
  chatPanelEl.setAttribute('aria-hidden', 'true');
  chatBackdropEl.setAttribute('aria-hidden', 'true');
  unlockBody();
  chatPanelEl.style.removeProperty('--chat-h');
  chatPanelEl.style.removeProperty('--chat-top');
}

});

// === Swipe-down-to-dismiss (mobile only) ===
// Drag the chat header downward to close the panel. Tracks vertical
// distance + velocity; either >100px or fast-flick closes, otherwise
// snaps back. Desktop falls through to the existing X-button / Esc path.
(function setupChatSwipeDismiss() {
  const head = chatPanelEl.querySelector('.chat-head');
  if (!head) return;
  let startY = 0, startT = 0, dragY = 0;
  let dragging = false;

  head.addEventListener('touchstart', (e) => {
    if (window.innerWidth > 900) return;
    if (!chatPanelEl.classList.contains('open')) return;
    if (e.touches.length !== 1) return;
    // Don't start a drag if the touch is on the X button (let it click).
    if (e.target.closest('.chat-close')) return;
    startY = e.touches[0].clientY;
    startT = Date.now();
    dragY = 0;
    dragging = true;
    head.classList.add('dragging');
    // Disable CSS transition while the finger drives the position.
    chatPanelEl.style.transition = 'none';
  }, { passive: true });

  head.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const dy = e.touches[0].clientY - startY;
    if (dy <= 0) {
      // Ignore upward drags — keep panel pinned at 0.
      chatPanelEl.style.transform = 'translateY(0)';
      dragY = 0;
      return;
    }
    dragY = dy;
    chatPanelEl.style.transform = 'translateY(' + dy + 'px)';
  }, { passive: true });

  function endDrag() {
    if (!dragging) return;
    dragging = false;
    head.classList.remove('dragging');
    const dt = Date.now() - startT;
    const velocity = dragY / Math.max(1, dt);  // px/ms
    // Restore CSS transition before triggering the final motion.
    chatPanelEl.style.transition = '';
    if (dragY > 100 || velocity > 0.5) {
      // Animate the rest of the way down (translateY 100%), then close
      // when the transition lands so backdrop/body-lock cleanup is in sync.
      chatPanelEl.style.transform = 'translateY(100%)';
      let cleaned = false;
      const finish = () => {
        if (cleaned) return;
        cleaned = true;
        chatPanelEl.removeEventListener('transitionend', finish);
        chatPanelEl.style.transform = '';
        chatClose();
      };
      chatPanelEl.addEventListener('transitionend', finish);
      // Safety net if transitionend doesn't fire (interrupted).
      setTimeout(finish, 380);
    } else {
      // Snap back to translateY(0) — clearing inline transform reveals
      // the .open rule, and the restored transition animates it.
      chatPanelEl.style.transform = '';
    }
  }
  head.addEventListener('touchend', endDrag, { passive: true });
  head.addEventListener('touchcancel', endDrag, { passive: true });
})();

// Turn bare URLs and markdown [label](url) into <a target="_blank"> nodes.
// Uses text nodes + anchor elements (no innerHTML) so it's XSS-safe.
function renderTextWithLinks(container, text) {
  const re = /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)|(https?:\/\/[^\s<>"']+[^\s<>().,;:!?"'])/g;
  let lastIndex = 0;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > lastIndex) {
      container.appendChild(document.createTextNode(text.slice(lastIndex, m.index)));
    }
    const isMd = m[1] && m[2];
    const href = isMd ? m[2] : m[3];
    const label = isMd ? m[1] : m[3];
    const a = document.createElement('a');
    a.href = href;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.textContent = label;
    a.className = 'chat-link';
    container.appendChild(a);
    lastIndex = re.lastIndex;
  }
  if (lastIndex < text.length) {
    container.appendChild(document.createTextNode(text.slice(lastIndex)));
  }
}

function appendChatMsg(role, text) {
  const div = document.createElement('div');
  div.className = `chat-msg ${role} ${role === 'user' ? '' : 'ko'}`.trim();
  if (role === 'user' || role === 'assistant') {
    renderTextWithLinks(div, text);
  } else {
    div.textContent = text;
  }
  chatMessagesEl.appendChild(div);
  chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
  return div;
}

// === Map-action tokens from the agent ===
// The agent is instructed to append `[map:LAT,LNG,NAME]` for places. We
// strip those out of the visible reply and render small action cards
// instead, each with "Show on map" + "+ Add" buttons.

function extractMapTokens(text) {
  const re = /\[map:\s*(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)\s*,\s*([^\]]+?)\s*\]/g;
  const mapPoints = [];
  const cleanText = text.replace(re, (_, lat, lng, name) => {
    const la = parseFloat(lat), ln = parseFloat(lng);
    if (Number.isFinite(la) && Number.isFinite(ln)) {
      mapPoints.push({ lat: la, lng: ln, name: name.trim() });
    }
    return '';
  }).replace(/\n{3,}/g, '\n\n').trim();
  return { cleanText, mapPoints };
}

function renderMapActionCards(points) {
  const wrap = document.createElement('div');
  wrap.className = 'chat-map-cards';
  points.forEach((p) => {
    const card = document.createElement('div');
    card.className = 'chat-map-card';
    const name = document.createElement('div');
    name.className = 'chat-map-name ko';
    name.textContent = '📍 ' + p.name;
    // Optional note input — captured at add time, persisted with the pin,
    // and shown in the popup + the sidebar Favorites section.
    const noteInput = document.createElement('input');
    noteInput.type = 'text';
    noteInput.className = 'chat-map-note';
    noteInput.placeholder = loc('메모 (선택) — 어떤 장소인지, 왜 가고 싶은지 등', 'Add a note (optional) — what this place is, why save it…');
    const btns = document.createElement('div');
    btns.className = 'chat-map-buttons';
    // Single action: drop a persistent ★ pin on the map AND fly to it.
    // (Replaces the old "Show on map" popover-only behavior.)
    const show = document.createElement('button');
    show.type = 'button';
    show.className = 'chat-map-btn';
    show.textContent = loc('★ 지도에 표시', '★ Show on map');
    show.addEventListener('click', () => {
      addCustomPoint(p.lat, p.lng, p.name, { note: noteInput.value });
      show.textContent = loc('★ 지도에 추가됨 · 다시 보기', '★ Added · re-center');
    });
    const gmap = document.createElement('a');
    gmap.className = 'chat-map-btn';
    gmap.target = '_blank';
    gmap.rel = 'noopener';
    gmap.href = 'https://maps.google.com/?q=' + encodeURIComponent(p.name);
    gmap.textContent = 'Google Maps ↗';
    btns.append(show, gmap);
    card.append(name, noteInput, btns);
    wrap.appendChild(card);
  });
  chatMessagesEl.appendChild(wrap);
  chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
}

// User-added (★) markers. Persisted to the shared backend (tripState.added)
// so they survive reload + sync across devices.
const customMarkers = new Map(); // key: "lat,lng,name" → leaflet marker

function showOnMap(lat, lng, name) {
  chatClose();
  // Wait for the drawer close animation before flying so the user perceives the motion.
  setTimeout(() => {
    if (!map) return;
    map.flyTo([lat, lng], 15, { duration: 0.9 });
    setTimeout(() => {
      L.popup({ closeButton: true, autoPan: true, className: 'chat-popup' })
        .setLatLng([lat, lng])
        .setContent(
          `<div class="popup-eyebrow">${botName()} · From chat</div>` +
          `<div class="popup-title">${name.replace(/[<>&"]/g, '')}</div>` +
          // Search by place name (not lat,lng) so Google Maps shows the
          // place card with reviews / hours instead of a raw coordinate pin.
          `<div class="popup-actions">` +
          `<a class="popup-link" target="_blank" rel="noopener" href="https://maps.google.com/?q=${encodeURIComponent(name)}">Google Maps →</a>` +
          `<a class="popup-link popup-link-dir" target="_blank" rel="noopener" href="${gmapsDirectionsURL(lat, lng, name)}">${loc('길찾기 →', 'Directions →')}</a>` +
          `</div>`
        )
        .openOn(map);
    }, 700);
  }, 320);
}

function addedKey(p) { return `${p.lat.toFixed(5)},${p.lng.toFixed(5)},${p.name}`; }

function addCustomPoint(lat, lng, name, opts) {
  opts = opts || {};
  const persist = opts.persist !== false;   // chat-add persists; replay does not
  const focus = opts.focus !== false;
  const note = (opts.note || '').trim();
  if (!map) return;
  const key = `${lat.toFixed(5)},${lng.toFixed(5)},${name}`;
  if (!customMarkers.has(key)) {
    const icon = L.divIcon({
      className: 'custom-marker',
      html: `<div class="custom-pin" data-name="${name.replace(/"/g, '&quot;')}">★</div>`,
      iconSize: [24, 24], iconAnchor: [12, 12], popupAnchor: [0, -11],
    });
    const marker = L.marker([lat, lng], { icon });
    marker.setZIndexOffset(1000);   // favorites always render above other markers
    marker.category = 'Saved';  // so legend filtering (applyMapFilters) controls it
    marker.customKey = key;
    // Function popup so the note (and Hide/Restore state) update on each open.
    marker.bindPopup(() => {
      const cur = tripState.added.find(a => addedKey(a) === key);
      return buildPlacePopup({
        eyebrow: loc('현서비서 추가', 'Added by Travel Bot'),
        title: name,
        note: (cur && cur.note) || '',
        gmapsQ: name, id: key,
        lat: lat, lng: lng,
      });
    }, { closeButton: true, autoPan: true });
    customMarkers.set(key, marker);
    if (!isHidden(key)) marker.addTo(map);
  }
  // Upsert into tripState.added, then save once if anything changed.
  let changed = false;
  const idx = tripState.added.findIndex(a => addedKey(a) === key);
  if (idx === -1) {
    tripState.added.push({ lat, lng, name, note });
    changed = true;
  } else if (note && tripState.added[idx].note !== note) {
    tripState.added[idx].note = note;
    changed = true;
  }
  if (persist && changed) saveTripState();
  syncFavoriteLegend();
  renderAddedList();
  if (typeof applyMapFilters === 'function') applyMapFilters();
  if (typeof applyListFilters === 'function') applyListFilters();
  if (focus) showOnMap(lat, lng, name);
}

// "Favorite" legend visibility tracks the total favorites count — that's
// pinned sub-points (URL hash) + user-added (★) custom pins. Show when there's
// at least one; hide when there are none (and drop a stale Saved-isolate).
function syncFavoriteLegend() {
  const el = document.getElementById('legendSaved');
  if (!el) return;
  const hasPinned = (location.hash.match(/(?:^|&|#)pin=([^&]*)/) || [])[1];
  const pinCount = hasPinned ? hasPinned.split(',').filter(Boolean).length : 0;
  const hasAny = pinCount > 0 || (typeof customMarkers !== 'undefined' && customMarkers.size > 0);
  el.hidden = !hasAny;
  if (hasAny) {
    if (!filters.activeCategories.has('Saved')) {
      filters.activeCategories.add('Saved');
      if (typeof syncLegendUI === 'function') syncLegendUI();
    }
  } else if (filters.activeCategories.size === 1 && filters.activeCategories.has('Saved')) {
    // Was isolated to Favorite but nothing left to show → restore everything.
    filters.activeCategories = new Set(ALL_CATS);
    if (typeof syncLegendUI === 'function') syncLegendUI();
  }
}
// Backwards-compatible alias for callers that still say "revealSavedLegend".
function revealSavedLegend() { syncFavoriteLegend(); }

// Renders the "★ Favorites" section at the top of the sidebar with the user's
// added pins. Items reuse .sub-point markup so filter/hide logic + styling
// flow through naturally. Hidden entries stay out unless Trash mode is on.
function renderAddedList() {
  if (typeof itineraryEl === 'undefined' || !itineraryEl) return;
  let section = document.getElementById('addedSection');
  if (!tripState.added.length) {
    if (section) section.remove();
    return;
  }
  if (!section) {
    section = document.createElement('section');
    section.id = 'addedSection';
    // Inherit .day-section spacing/border so it matches the rest of the list.
    section.className = 'day-section added-section';
    itineraryEl.insertBefore(section, itineraryEl.firstChild);
  }
  const rows = tripState.added.map(p => {
    const key = addedKey(p);
    const safeKey = key.replace(/"/g, '&quot;');
    const safeName = String(p.name || '').replace(/[<>&"]/g, '');
    const safeNote = String(p.note || '').replace(/[<>&"]/g, '');
    return `
      <div class="sub-point added-point" data-sub="${safeKey}" data-cat="Saved" data-lat="${p.lat}" data-lng="${p.lng}" data-name="${safeName}">
        <div class="sub-point-dot"></div>
        <div class="sub-point-body">
          <div class="sub-point-name">${safeName}</div>
          ${safeNote ? `<div class="sub-point-note ko">${safeNote}</div>` : ''}
        </div>
        <div class="sub-point-right">
          <div class="sub-point-actions">
            <button class="sub-point-remove" data-id="${safeKey}" aria-label="Remove" title="${loc('관심 없음','Remove')}">🗑</button>
          </div>
          <div class="sub-point-cat" data-cat="Saved">★ ${loc('찜','Favorite')}</div>
        </div>
      </div>`;
  }).join('');
  const n = tripState.added.length;
  const countLabel = LANG === 'en' ? `${n} place${n === 1 ? '' : 's'}` : `${n}곳`;
  section.innerHTML = `
    <div class="day-header">
      <div class="day-eyebrow"><span class="day-dot added-eyebrow-dot">★</span>${loc('추가한 장소', 'Favorites')}</div>
      <div class="day-name">${loc('★ 즐겨찾기', '★ Favorites')}</div>
      <div class="day-date">${countLabel}</div>
    </div>
    <div class="added-stops">
      <div class="sub-points">${rows}</div>
    </div>`;
  // Wire row clicks → fly map to the place (action buttons handle themselves
  // via the document-delegated remove handler).
  section.querySelectorAll('.added-point').forEach(row => {
    row.addEventListener('click', (e) => {
      if (e.target.closest('.sub-point-pin, .sub-point-remove')) return;
      const lat = parseFloat(row.dataset.lat);
      const lng = parseFloat(row.dataset.lng);
      const nm = row.dataset.name;
      if (Number.isFinite(lat) && Number.isFinite(lng)) showOnMap(lat, lng, nm);
    });
  });
}

// =========== SHARED TRIP STATE (saved ★ + hidden/trashed places) ===========
// Persisted via the Worker's /state endpoint (Cloudflare KV) so the whole
// group sees the same map on every device. Degrades to in-session only if the
// backend is unreachable (fetch failures are swallowed).
const STATE_API = PROXY_URL + '/state';
const tripState = { added: [], hidden: [] };
let stateSaveTimer = null;

function isHidden(id) { return tripState.hidden.indexOf(id) !== -1; }

async function loadTripState() {
  try {
    const r = await fetch(STATE_API, { method: 'GET' });
    if (r.ok) {
      const d = await r.json();
      if (Array.isArray(d.added))  tripState.added  = d.added;
      if (Array.isArray(d.hidden)) tripState.hidden = d.hidden;
    }
  } catch (_) { /* offline / not yet deployed — in-session only */ }
  applyTripState();
}

function saveTripState() {
  if (stateSaveTimer) clearTimeout(stateSaveTimer);
  stateSaveTimer = setTimeout(() => {
    fetch(STATE_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ added: tripState.added, hidden: tripState.hidden }),
    }).catch(() => {});
  }, 600);
}

// Re-create saved pins + apply hidden visibility + reveal legends/panel.
function applyTripState() {
  tripState.added.forEach(p => {
    if (p && Number.isFinite(p.lat) && Number.isFinite(p.lng)) {
      addCustomPoint(p.lat, p.lng, p.name, { persist: false, focus: false, note: p.note });
    }
  });
  renderAddedList();
  if (tripState.added.length) revealSavedLegend();
  if (tripState.hidden.length) revealTrashLegend();
  if (typeof applyMapFilters === 'function') applyMapFilters();
  if (typeof applyListFilters === 'function') applyListFilters();
  renderTrashPanel();
}

function hidePlace(id) {
  if (!id || isHidden(id)) return;
  tripState.hidden.push(id);
  saveTripState();
  revealTrashLegend();
  if (map) map.closePopup();
  applyMapFilters();
  applyListFilters();
  renderTrashPanel();
}

function restorePlace(id) {
  const i = tripState.hidden.indexOf(id);
  if (i === -1) return;
  tripState.hidden.splice(i, 1);
  saveTripState();
  if (map) map.closePopup();
  // Nothing left in the trash → exit trash mode + hide the Deleted toggle.
  if (!tripState.hidden.length) {
    filters.showTrash = false;
    const tb = document.getElementById('legendTrash');
    if (tb) { tb.classList.remove('on'); tb.hidden = true; }
  }
  applyMapFilters();
  applyListFilters();
  renderTrashPanel();
}

// Build a place popup with Favorite (★) + Remove/Restore icon actions, reading
// current state each open (bound as a function). Used by sub-point markers and
// user-added ★ pins. The decorative leading "★ " in curated names is stripped
// from the title since favoriting is now an explicit button.
// Helper: Google Maps **directions** URL with walking as the default mode.
function gmapsDirectionsURL(lat, lng, name) {
  const dest = Number.isFinite(lat) && Number.isFinite(lng)
    ? `${lat},${lng}`
    : encodeURIComponent(name || '');
  return `https://www.google.com/maps/dir/?api=1&destination=${dest}&travelmode=walking`;
}

function buildPlacePopup({ eyebrow, title, addr, note, gmapsQ, id, lat, lng }) {
  const safeId = String(id).replace(/"/g, '&quot;');
  const isSub = /^\d+-\d+$/.test(String(id));   // only sub-points are favoritable
  const pinned = isSub && parseHash().pin.indexOf(id) !== -1;
  const favBtn = isSub
    ? `<button type="button" class="popup-icon-btn popup-fav${pinned ? ' on' : ''}" data-sub="${safeId}" title="${loc('찜', 'Favorite')}" aria-label="Favorite">${pinned ? '★' : '☆'}</button>`
    : '';
  const removeBtn = isHidden(id)
    ? `<button type="button" class="popup-icon-btn popup-restore" data-id="${safeId}" title="${loc('다시 표시', 'Restore')}" aria-label="Restore">↩</button>`
    : `<button type="button" class="popup-icon-btn popup-hide" data-id="${safeId}" title="${loc('관심 없음', 'Remove')}" aria-label="Remove">🗑</button>`;
  const cleanTitle = String(title).replace(/^★\s*/, '').replace(/[<>]/g, '');
  const dirHref = gmapsDirectionsURL(lat, lng, title || gmapsQ);
  return `
    <div class="popup-eyebrow">${eyebrow}</div>
    <div class="popup-title">${cleanTitle}</div>
    ${addr ? `<div class="popup-address">${addr}</div>` : ''}
    ${note ? `<div class="popup-note ko">${note}</div>` : ''}
    <div class="popup-actions">
      <a class="popup-link" href="https://maps.google.com/?q=${encodeURIComponent(gmapsQ)}" target="_blank" rel="noopener">Google Maps →</a>
      <a class="popup-link popup-link-dir" href="${dirHref}" target="_blank" rel="noopener">${loc('길찾기 →', 'Directions →')}</a>
      ${favBtn}
      ${removeBtn}
    </div>`;
}

// Resolve a hidden id → display name (+ coords) for the trash panel.
function resolveHidden(id) {
  const sub = /^(\d+)-(\d+)$/.exec(id);
  if (sub) {
    const stop = itinerary.find(s => s.num === +sub[1]);
    const p = stop && stop.points && stop.points[+sub[2]];
    if (p) return { name: tr(p.name), lat: p.lat, lng: p.lng };
  }
  const parts = String(id).split(',');
  if (parts.length >= 3) {
    const lat = parseFloat(parts[0]), lng = parseFloat(parts[1]);
    if (Number.isFinite(lat)) return { name: parts.slice(2).join(','), lat, lng };
  }
  return { name: id, lat: null, lng: null };
}

function revealTrashLegend() {
  const el = document.getElementById('legendTrash');
  if (el) el.hidden = false;
}

// The trash panel lists removed places with a "put back" button. Visible only
// while Trash mode is on.
function renderTrashPanel() {
  const panel = document.getElementById('trashPanel');
  if (!panel) return;
  if (!filters.showTrash) { panel.hidden = true; panel.innerHTML = ''; return; }
  panel.hidden = false;
  const rows = tripState.hidden.map(id => {
    const r = resolveHidden(id);
    const safeName = String(r.name || '').replace(/[<>&"]/g, '');
    const safeId = String(id).replace(/"/g, '&quot;');
    return `<div class="trash-row"><span class="trash-name" title="${safeName}">${safeName}</span>` +
      `<button type="button" class="trash-restore popup-restore" data-id="${safeId}">${loc('복구', 'Put back')}</button></div>`;
  }).join('');
  panel.innerHTML = `<div class="trash-panel-title">🗑 ${loc('관심 없음 목록', 'Hidden places')}</div>` +
    (rows || `<div class="trash-empty">${loc('비어 있음', 'Nothing here')}</div>`);
}

// Delegated handler for Hide/Restore buttons (popups + trash panel).
// The list's .sub-point-remove is a TOGGLE: hide when active, restore when
// the row is currently shown as deleted (in Trash mode).
document.addEventListener('click', (e) => {
  const subRemove = e.target.closest('.sub-point-remove');
  if (subRemove) {
    e.preventDefault(); e.stopPropagation();
    const id = subRemove.dataset.id;
    isHidden(id) ? restorePlace(id) : hidePlace(id);
    return;
  }
  const hideBtn = e.target.closest('.popup-hide');
  if (hideBtn) { e.preventDefault(); e.stopPropagation(); hidePlace(hideBtn.dataset.id); return; }
  const restoreBtn = e.target.closest('.popup-restore');
  if (restoreBtn) { e.preventDefault(); restorePlace(restoreBtn.dataset.id); return; }
});

// Trash legend → toggle Trash mode (reveal deleted rows/pins + restore panel).
const legendTrashBtn = document.getElementById('legendTrash');
if (legendTrashBtn) {
  legendTrashBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    filters.showTrash = !filters.showTrash;
    legendTrashBtn.classList.toggle('on', filters.showTrash);
    applyMapFilters();
    applyListFilters();
    renderTrashPanel();
  });
}

function buildSystemPrompt() {
  const today = '2026-05-23';
  const slim = itinerary.map(s => ({
    day: s.day, num: s.num, time: s.time, name: s.name, address: s.address,
    transit: s.transit, note: s.note, tag: s.tag, tbd: s.tbd || false,
    points: s.points ? s.points.map(p => ({ name: p.name, category: p.category, addr: p.addr, note: p.note })) : undefined,
  }));
  const langRule = LANG === 'en'
    ? 'The user has the app set to English. Always reply in English. You may keep proper nouns (place names, dish names) in their original form.'
    : 'Reply in the user\'s language. The user mixes Korean and English; default to Korean for notes and English for proper nouns.';
  return [
    'You are a concise, practical NYC trip assistant for a 4-person group.',
    'Trip dates: May 29 (Fri) – May 31 (Sun), 2026. Today is ' + today + '.',
    'Hotel: InterContinental Barclay (111 E 48th St, Midtown).',
    langRule,
    'Be specific: name places, give cross streets / subway stops, mention timing. Keep answers tight — 3–5 lines unless the user asks for more.',
    'When suggesting alternatives, prefer places not already in the itinerary unless the user is asking about an existing stop.',
    'Itinerary JSON follows:',
    JSON.stringify(slim),
  ].join('\n');
}

async function callAnthropic(systemPrompt) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'content-type': 'application/json',
    },
    body: JSON.stringify({
      model: ANTHROPIC_MODEL,
      max_tokens: 1024,
      system: systemPrompt,
      messages: chatHistory,
    }),
  });
  if (!r.ok) {
    let errMsg = `Error ${r.status}`;
    try { const j = await r.json(); errMsg = j.error?.message || errMsg; } catch (_) {}
    return { ok: false, status: r.status, error: errMsg };
  }
  const data = await r.json();
  return { ok: true, text: data.content?.[0]?.text || '(빈 응답)' };
}

async function callAzureResponses(systemPrompt) {
  // Azure AI Foundry Responses API (or the /api/chat proxy that wraps it).
  //   - If CFG.agent is set, reference a Foundry Agent (uses its baked-in
  //     instructions + tools). We prepend a context message with the
  //     itinerary JSON so the agent has access to the current trip data.
  //   - Otherwise, use CFG.model and our own system prompt.
  //   - In 'proxy' mode the server adds the api-key + pins the agent, so the
  //     browser doesn't send (and never holds) the Azure key.
  const isProxy = PROVIDER === 'proxy';
  const useAgent = !!CFG.agent;
  const input = [];
  if (useAgent) {
    const langDirective = LANG === 'en'
      ? `\n\nLANGUAGE — IMPORTANT: The user has set the app to English. Reply ONLY in English, no matter what language the question is in. Proper nouns (place names, dish names) may stay in their original form.`
      : `\n\nLANGUAGE — IMPORTANT: 사용자가 앱을 한국어 모드로 설정했습니다. 항상 한국어로 답해주세요. (고유명사는 원어 그대로 사용 가능.)`;
    // If the user has shared their location (📍 button), pass it + the current
    // NYC local time so the bot can ground recommendations in proximity + hours.
    let locDirective = '';
    if (userLocation) {
      const t = new Date().toLocaleString('en-US', {
        timeZone: 'America/New_York',
        weekday: 'short', month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit', hour12: true,
      });
      locDirective = `\n\nCURRENT CONTEXT:
- User's current location: lat=${userLocation.lat.toFixed(5)}, lng=${userLocation.lng.toFixed(5)} (±${Math.round(userLocation.accuracy)}m)
- Current NYC local time: ${t}
When the user asks for things "nearby" or "near me", prefer places within a 10–15 min walk of that lat/lng AND likely open right now. Always state the walking distance/time and a one-line "why this." If they ask for the closest restroom, suggest practical real options (a specific cafe, hotel lobby, department store, library, or public restroom — name it). Always use the [map:lat,lng,name] protocol to drop a pin for any new place.`;
    }
    input.push({
      role: 'user',
      content: `Trip itinerary context (source of truth for stops, times, addresses):
${JSON.stringify(itinerary)}

Map-action protocol: whenever you mention a specific place with known coordinates, append a marker on its own line at the END of your reply, in this exact format:

[map:LAT,LNG,NAME]

Example: [map:40.7795,-73.9808,Levain Bakery]

Rules:
- Multiple places → multiple marker lines, each on its own line.
- For places already in the itinerary, the marker is optional (the user can click the stop card). But for any NEW place not in the itinerary, ALWAYS include the marker so the user can add it to their map.
- The marker does NOT replace your natural-language reply — it's appended after it. Keep your normal prose unchanged.
- Use precise decimal coordinates (4+ decimals). Use the place's English name in NAME.${locDirective}${langDirective}`,
    });
    input.push({ role: 'assistant', content: loc(
      '네, 일정 확인했습니다. 새로운 장소를 추천할 때는 [map:위도,경도,이름] 마커도 같이 붙일게요.',
      'Got it — I\'ve reviewed the itinerary. When I suggest a new place I\'ll append a [map:lat,lng,name] marker, and I\'ll reply in English.'
    ) });
  } else {
    input.push({ role: 'system', content: systemPrompt });
  }
  for (const m of chatHistory) input.push({ role: m.role, content: m.content });

  const body = { input };
  if (useAgent && !isProxy) {
    body.agent_reference = { name: CFG.agent.name, version: String(CFG.agent.version), type: 'agent_reference' };
  } else if (!useAgent) {
    body.model = CFG.model || 'gpt-4o-mini';
  }
  // In proxy mode the server pins agent_reference, so the client doesn't send it.

  const headers = { 'Content-Type': 'application/json' };
  if (!isProxy) headers['api-key'] = apiKey;

  const r = await fetch(CFG.endpoint, {
    method: 'POST',
    headers,
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    let errMsg = `Error ${r.status}`;
    try {
      const j = await r.json();
      errMsg = j.error?.message || j.message || JSON.stringify(j).slice(0, 200);
    } catch (_) {}
    return { ok: false, status: r.status, error: errMsg };
  }
  const data = await r.json();
  // Responses API: prefer `output_text`, fall back to walking output[].content[].text,
  // fall back to chat-completions shape just in case.
  let text = data.output_text;
  if (!text && Array.isArray(data.output)) {
    for (const item of data.output) {
      if (item.type === 'message' && Array.isArray(item.content)) {
        for (const c of item.content) {
          if (c.type === 'output_text' && c.text) { text = c.text; break; }
          if (c.type === 'text' && c.text) { text = c.text; break; }
        }
        if (text) break;
      }
    }
  }
  if (!text) text = data.choices?.[0]?.message?.content;
  return { ok: true, text: text || '(빈 응답)' };
}

async function sendChat(text) {
  text = text.trim();
  if (!text) return;
  if (NEEDS_BROWSER_KEY && !apiKey) {
    appendChatMsg('error', loc('API key 먼저 입력해 주세요 ↑', 'Please enter your API key first ↑'));
    chatKeyInputEl.focus();
    return;
  }
  // Abort any in-flight voice recognition. Otherwise a late onresult event
  // would re-fill the input we just cleared with the same transcript.
  voiceAbort();
  chatSuggestionsEl.classList.add('hidden');
  appendChatMsg('user', text);
  chatHistory.push({ role: 'user', content: text });
  chatInputEl.value = '';
  chatInputEl.style.height = 'auto';
  chatSendEl.disabled = true;
  const typing = appendTyping();
  try {
    const systemPrompt = buildSystemPrompt();
    const result = (PROVIDER === 'proxy' || PROVIDER === 'azure-responses')
      ? await callAzureResponses(systemPrompt)
      : await callAnthropic(systemPrompt);
    typing.remove();
    if (!result.ok) {
      if (result.status === 401 || result.status === 403) {
        if (PROVIDER === 'anthropic') setApiKey(null);
        appendChatMsg('error', loc('API key가 유효하지 않거나 권한이 없습니다.', 'Your API key is invalid or lacks permission.'));
      } else if (result.status === 405 && PROVIDER === 'proxy') {
        // 405 from a static host (GitHub Pages, python http.server, etc.) means
        // the request isn't reaching a Worker. Two likely causes:
        //   - Worker not deployed yet → see worker/README.md
        //   - PROXY_URL in index.html still points at the placeholder
        appendChatMsg('error', loc('Chat 프록시(Worker)를 찾을 수 없어요. worker/README.md를 보고 Cloudflare Worker 배포 후 index.html의 PROXY_URL을 업데이트해 주세요.', "Can't reach the chat proxy (Worker). See worker/README.md, deploy the Cloudflare Worker, then update PROXY_URL in index.html."));
      } else if (result.status === 405) {
        appendChatMsg('error', loc('Method 405 — 엔드포인트가 POST를 받지 않아요. PROXY_URL이 Cloudflare Worker URL인지 확인해 주세요.', 'Method 405 — the endpoint rejects POST. Check that PROXY_URL is the Cloudflare Worker URL.'));
      } else {
        appendChatMsg('error', result.error);
      }
      chatHistory.pop();
      return;
    }
    // Parse [map:LAT,LNG,NAME] tokens out of the visible reply, render the
    // clean prose, then append action cards for each token.
    chatHistory.push({ role: 'assistant', content: result.text });
    const { cleanText, mapPoints } = extractMapTokens(result.text);
    appendChatMsg('assistant', cleanText);
    if (mapPoints.length) renderMapActionCards(mapPoints);
  } catch (e) {
    typing.remove();
    appendChatMsg('error', e.message || 'Network error');
    chatHistory.pop();
  } finally {
    chatSendEl.disabled = false;
    chatInputEl.focus();
  }
}

// =========== USER LOCATION (📍 Locate me) ===========
// Single-fix geolocation (no continuous tracking). On success: drop a pulsing
// blue marker, fly the map to it, store userLocation for the chat to use, and
// reveal the "Near you" suggestion chips.
let userLocation = null;          // { lat, lng, accuracy, time }
let userLocationMarker = null;
const locateBtnEl = document.getElementById('locateBtn');

function revealNearYouChips() {
  const near = document.getElementById('chatSuggNear');
  if (near) near.hidden = false;
}

function locateMe() {
  if (!navigator.geolocation) {
    alert(loc('이 브라우저는 위치 정보를 지원하지 않습니다.', 'Geolocation is not supported in this browser.'));
    return;
  }
  if (!map) return;
  locateBtnEl.disabled = true;
  navigator.geolocation.getCurrentPosition(pos => {
    locateBtnEl.disabled = false;
    const { latitude: lat, longitude: lng, accuracy } = pos.coords;
    userLocation = { lat, lng, accuracy, time: Date.now() };
    if (userLocationMarker) map.removeLayer(userLocationMarker);
    const icon = L.divIcon({
      className: 'custom-marker',
      html: '<div class="user-location-marker"></div>',
      iconSize: [16, 16], iconAnchor: [8, 8],
    });
    userLocationMarker = L.marker([lat, lng], { icon, interactive: false }).addTo(map);
    userLocationMarker.setZIndexOffset(2000);  // above favorites
    map.flyTo([lat, lng], Math.max(map.getZoom(), 15), { duration: 0.9 });
    locateBtnEl.classList.add('on');
    revealNearYouChips();
  }, err => {
    locateBtnEl.disabled = false;
    const msg = err && err.code === 1
      ? loc('위치 권한이 거부되었어요. 브라우저 설정에서 허용 후 다시 시도해 주세요.', 'Location permission denied. Allow it in your browser settings and try again.')
      : loc('위치를 가져오지 못했어요. 다시 시도해 주세요.', "Couldn't get your location. Please try again.");
    alert(msg);
  }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 60000 });
}

if (locateBtnEl) locateBtnEl.addEventListener('click', locateMe);

// =========== MAP / LIST RESIZE (mobile) ===========
// Drag the divider between the map and list to change the split. Updates
// --map-mobile-h (px) on .app and tells Leaflet to recompute its size.
// Default (set in CSS) is half map / half list.
(function setupMapResize() {
  const handle = document.getElementById('mapResizeHandle');
  const appEl = document.querySelector('.app');
  const mapWrap = document.querySelector('.map-wrap');
  if (!handle || !appEl || !mapWrap) return;

  let startY = 0, startH = 0, dragging = false, rafPending = false;

  handle.addEventListener('pointerdown', (e) => {
    if (window.innerWidth > 900) return;
    dragging = true;
    handle.classList.add('dragging');
    try { handle.setPointerCapture(e.pointerId); } catch (_) {}
    startY = e.clientY;
    startH = mapWrap.getBoundingClientRect().height;
    e.preventDefault();
  });

  handle.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dy = e.clientY - startY;
    const min = 140;
    const max = window.innerHeight * 0.75;
    const h = Math.max(min, Math.min(max, startH + dy));
    appEl.style.setProperty('--map-mobile-h', h + 'px');
    if (!rafPending) {
      rafPending = true;
      requestAnimationFrame(() => {
        if (typeof map !== 'undefined' && map) map.invalidateSize();
        rafPending = false;
      });
    }
  });

  function end(e) {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    try { handle.releasePointerCapture(e.pointerId); } catch (_) {}
    if (typeof map !== 'undefined' && map) setTimeout(() => map.invalidateSize(), 60);
  }
  handle.addEventListener('pointerup', end);
  handle.addEventListener('pointercancel', end);
})();

// =========== SWIPE TO CHANGE DAY (mobile) ===========
// Horizontal drag on the sidebar cycles through tabs: All → Fri → Sat → Sun → All.
// Triggered only when the swipe is short, fast, and clearly horizontal (so it
// doesn't fight with the list's vertical scroll). The map area is excluded so
// Leaflet's pan gesture isn't fought.
(function setupSwipeDayNav() {
  const listEl = document.querySelector('.list');
  if (!listEl) return;
  const DAYS = ['all', '1', '2', '3'];
  const MIN_DX = 60;            // px — minimum horizontal distance
  const MAX_DT = 600;           // ms — must complete within this window
  const VERT_RATIO = 0.7;       // |dy| < |dx| * 0.7 → counts as horizontal
  let startX = 0, startY = 0, startT = 0, active = false;

  listEl.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    // Skip if the touch began inside the chat panel (don't fight drawer interactions).
    if (e.target.closest('.chat-panel')) { active = false; return; }
    const t = e.touches[0];
    startX = t.clientX;
    startY = t.clientY;
    startT = Date.now();
    active = true;
  }, { passive: true });

  listEl.addEventListener('touchend', (e) => {
    if (!active) return;
    active = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const dt = Date.now() - startT;
    if (dt > MAX_DT) return;
    if (Math.abs(dx) < MIN_DX) return;
    if (Math.abs(dy) > Math.abs(dx) * VERT_RATIO) return;

    const idx = DAYS.indexOf(filters.activeDay);
    if (idx === -1) return;
    // Swipe LEFT (dx < 0) → next day; RIGHT → previous day.
    const next = (idx + (dx < 0 ? 1 : -1) + DAYS.length) % DAYS.length;
    const tab = document.querySelector(`.tab[data-day="${DAYS[next]}"]`);
    if (tab) tab.click();
  }, { passive: true });
})();

// =========== VOICE INPUT (Web Speech API) ===========
// Mic button next to Send — taps a browser-side STT engine, streams the
// transcript into the textarea live. Korean-default (the agent replies in
// Korean and the user is likely speaking Korean). On unsupported browsers
// (mainly Chrome on iOS), the button stays hidden so nothing's promised
// that won't work.
// Exposed at outer scope so sendChat can yank the recognizer when Enter
// is pressed — otherwise a late `onresult` re-fills the input we just cleared.
let voiceAbort = () => {};
(function setupVoiceInput() {
  const micBtn = document.getElementById('chatMicBtn');
  if (!micBtn) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;  // unsupported → mic stays hidden via [hidden]
  micBtn.hidden = false;
  micBtn.title = '음성 입력 (Korean STT)';

  let recognition = null;
  let listening = false;
  // Snapshot whatever's already in the textarea so the new transcript is
  // appended, not overwriting. (User might dictate a follow-up to typed text.)
  let baseValue = '';
  // Auto-retry once on transient `network` errors — Chrome's Web Speech API
  // streams audio to Google's servers; brief hiccups are common.
  let retriedOnNetworkError = false;

  // Friendly Korean blurbs for each known SpeechRecognitionErrorEvent.error.
  // Chrome / Edge use Google's cloud STT for ko-KR; no network = no STT.
  function describeError(code) {
    switch (code) {
      case 'not-allowed':
      case 'service-not-allowed':
        return '마이크 권한이 차단돼 있어요. 주소창 자물쇠 아이콘에서 마이크를 허용해 주세요.';
      case 'audio-capture':
        return '마이크를 찾을 수 없어요. 다른 앱이 마이크를 점유 중인지 확인해 주세요.';
      case 'network':
        return '음성 인식 서버(Google)에 연결하지 못했어요. 인터넷 연결 / VPN 상태를 확인하고 다시 눌러주세요. (Chrome의 한국어 STT는 온라인 전송 방식이라 네트워크가 필요해요.)';
      case 'language-not-supported':
        return '이 브라우저에서는 한국어 음성 인식을 지원하지 않아요. Chrome / Edge에서 시도해 주세요.';
      case 'bad-grammar':
        return '음성 인식이 일시적으로 실패했어요. 잠시 후 다시 시도해 주세요.';
      default:
        return '음성 인식 오류: ' + (code || 'unknown');
    }
  }

  function start() {
    if (listening) return;
    recognition = new SR();
    recognition.lang = 'ko-KR';
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    baseValue = chatInputEl.value;
    if (baseValue && !/\s$/.test(baseValue)) baseValue += ' ';

    recognition.onstart = () => {
      listening = true;
      micBtn.classList.add('listening');
      micBtn.setAttribute('aria-label', '듣는 중 — 다시 누르면 멈춤');
    };
    recognition.onresult = (e) => {
      let transcript = '';
      for (let i = 0; i < e.results.length; i++) transcript += e.results[i][0].transcript;
      chatInputEl.value = baseValue + transcript;
      chatInputEl.dispatchEvent(new Event('input'));
      // Got a result → this was clearly a clean run; clear the retry flag.
      retriedOnNetworkError = false;
    };
    recognition.onerror = (e) => {
      // 'no-speech' / 'aborted' are normal flow events — silent.
      if (e.error === 'no-speech' || e.error === 'aborted') return;
      // Transient network blip: try one auto-retry before bothering the user.
      if (e.error === 'network' && !retriedOnNetworkError) {
        retriedOnNetworkError = true;
        // The recognizer fires onend after onerror; restart from there.
        recognition._retryAfterEnd = true;
        return;
      }
      appendChatMsg('error', describeError(e.error));
      retriedOnNetworkError = false;
    };
    recognition.onend = () => {
      listening = false;
      micBtn.classList.remove('listening');
      micBtn.setAttribute('aria-label', '음성 입력');
      // If we flagged a retry, restart now (after a short pause so the
      // recognizer fully settles between sessions).
      if (recognition && recognition._retryAfterEnd) {
        recognition._retryAfterEnd = false;
        setTimeout(() => { try { start(); } catch (_) {} }, 400);
        return;
      }
      // Refocus the textarea so the user can immediately edit or Send.
      chatInputEl.focus();
    };

    try { recognition.start(); }
    catch (_) {
      listening = false;
      micBtn.classList.remove('listening');
    }
  }

  function stop() {
    if (recognition) {
      try { recognition.stop(); } catch (_) {}
    }
  }

  // abort() discards any pending result (unlike stop(), which allows the
  // last partial result to fire onresult). We use abort() when sending so
  // a late event doesn't re-populate the just-cleared input.
  function abort() {
    if (recognition) {
      try { recognition.abort(); } catch (_) {}
    }
    listening = false;
    micBtn.classList.remove('listening');
  }
  voiceAbort = abort;

  micBtn.addEventListener('click', () => {
    if (listening) stop();
    else start();
  });

  // Stop recognition if the chat drawer closes mid-listen — avoids the
  // mic continuing to capture after the user dismisses the panel.
  chatCloseEl.addEventListener('click', () => { if (listening) stop(); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && listening) stop();
  });
})();
</script>

</body>
</html>
